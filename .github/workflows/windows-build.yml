name: Windows build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build dikotur.exe (deps + PyInstaller)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt "pyinstaller>=6.0"
          pyinstaller --noconfirm --clean --windowed --onefile `
            --name dikotur `
            --add-data "sesler;sesler" `
            --hidden-import posture_detector `
            --collect-all mediapipe `
            --collect-all PyQt6 `
            --collect-all cv2 `
            --collect-all pygame `
            dikotur.py

      - name: Upload Windows executable
        uses: actions/upload-artifact@v4
        with:
          name: dikotur-windows-exe
          path: dist/dikotur.exe
          if-no-files-found: error
